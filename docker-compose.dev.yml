# Тут можно открыть порты баз и фронт/бека для теста
services:
  backend:
    build:
      target: dev
    environment:
      APP_ENV: local
      APP_DEBUG: true
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports: !override
      - "3000:443"