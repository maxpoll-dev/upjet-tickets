services:
  postgres:
    image: postgres:18-alpine
    container_name: upjet-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laravel} -d ${POSTGRES_DB:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: upjet-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    container_name: upjet-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: ./backend
      target: production
    container_name: upjet-queue
    restart: unless-stopped
    healthcheck:
      test: ["NONE"]
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=3
    env_file: ./backend/.env
    environment:
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: upjet-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend

# Намеренно вынес риверс прокси в отдельный контейнер.
# Использовать caddy в образе бека оптимально если бы реакт использовался внутри через laravel view
  nginx:
    image: nginx:alpine
    container_name: upjet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data: